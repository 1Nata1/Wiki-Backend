<!DOCTYPE html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      href="https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style.css?v=5" />
    <script src="api.js"></script>
    <title>Login - Wiki</title>
    <style>
      .loading-spinner {
        display: inline-block;
        width: 18px;
        height: 18px;
        border: 2px solid rgba(255,255,255,0.3);
        border-radius: 50%;
        border-top-color: #fff;
        animation: spin 0.6s linear infinite;
        vertical-align: middle;
        margin-right: 6px;
      }
      @keyframes spin { to { transform: rotate(360deg); } }
    </style>
  </head>
  <body>
    <main class="container">
      <form id="loginForm">
        <h1>Login</h1>
        <div class="input-box">
          <input id="username" placeholder="Usuário ou email" type="text" required />
          <i class="bx bxs-user"></i>
        </div>
        <div class="input-box">
          <input id="password" placeholder="Senha" type="password" required />
          <i class="bx bxs-lock-alt"></i>
        </div>
        <div id="loginError" style="color: #ef5350; text-align: center; margin-bottom: 10px; display: none;"></div>
        <div class="Lembrar">
          <label>
            <input type="checkbox" id="remember" checked />
            Lembrar login
          </label>
          <a href="#" style="pointer-events: none; opacity: 0.5;">Esqueci a senha</a>
        </div>
        <button type="submit" class="LoginBtn" id="btnEntrar">Entrar</button>
        <div class="Cadastro">
          <p>Não tem uma conta? <a href="cadastro.html">Cadastre-se</a></p>
        </div>
      </form>
    </main>

    <script>
      const loginForm = document.getElementById("loginForm");
      const loginError = document.getElementById("loginError");
      const btnEntrar = document.getElementById("btnEntrar");

      // Verifica se já está logado (pela API)
      if (isLogado()) {
        window.location.href = "../Wiki/";
      }

      loginForm.addEventListener("submit", async (e) => {
        e.preventDefault();
        loginError.style.display = "none";

        const username = document.getElementById("username").value.trim();
        const password = document.getElementById("password").value;
        const remember = document.getElementById("remember").checked;

        // Desabilita botão
        btnEntrar.disabled = true;
        btnEntrar.innerHTML = '<span class="loading-spinner"></span> Entrando...';

        try {
          const result = await apiLogin(username, password);

          if (result.success) {
            setSession(result.token, result.user.username, result.user.nome, remember);
            window.location.href = "../Wiki/";
          } else {
            loginError.textContent = result.error || "Usuário ou senha incorretos!";
            loginError.style.display = "block";
          }
        } catch (err) {
          loginError.textContent = "Erro de conexão com o servidor!";
          loginError.style.display = "block";
        } finally {
          btnEntrar.disabled = false;
          btnEntrar.textContent = "Entrar";
        }
      });
    </script>
  </body>
</html>
