<!DOCTYPE html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      href="https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style.css?v=3" />
    <script src="../api.js"></script>
    <title>Cadastro - Wiki</title>
    <style>
      .loading-spinner {
        display: inline-block;
        width: 18px;
        height: 18px;
        border: 2px solid rgba(255,255,255,0.3);
        border-radius: 50%;
        border-top-color: #fff;
        animation: spin 0.6s linear infinite;
        vertical-align: middle;
        margin-right: 6px;
      }
      @keyframes spin { to { transform: rotate(360deg); } }
    </style>
  </head>
  <body>
    <main class="container">
      <form id="cadastroForm">
        <h1>Criar Conta</h1>

        <div class="input-box">
          <input id="nome" placeholder="Nome completo" type="text" required />
          <i class="bx bxs-user"></i>
        </div>

        <div class="input-box">
          <input id="username" placeholder="Usuário" type="text" required />
          <i class="bx bxs-user-account"></i>
        </div>

        <div class="input-box">
          <input id="email" placeholder="Email" type="email" required />
          <i class="bx bxs-envelope"></i>
        </div>

        <div class="input-box">
          <input id="password" placeholder="Senha" type="password" required />
          <i class="bx bxs-lock-alt"></i>
        </div>

        <div class="input-box">
          <input id="confirmPassword" placeholder="Confirmar senha" type="password" required />
          <i class="bx bxs-lock"></i>
        </div>

        <div id="cadastroError" style="color: #ef5350; text-align: center; margin-bottom: 8px; display: none;"></div>
        <div id="cadastroSuccess" style="color: #66bb6a; text-align: center; margin-bottom: 8px; display: none;"></div>

        <button type="submit" class="LoginBtn" id="btnCriar">Criar Conta</button>

        <div class="Cadastro">
          <p>Já tem uma conta? <a href="index.html">Fazer login</a></p>
        </div>
      </form>
    </main>

    <script>
      const form = document.getElementById("cadastroForm");
      const errorDiv = document.getElementById("cadastroError");
      const successDiv = document.getElementById("cadastroSuccess");
      const btnCriar = document.getElementById("btnCriar");

      // Se já estiver logado, vai direto pra wiki
      if (isLogado()) {
        window.location.href = "../Wiki/";
      }

      form.addEventListener("submit", async (e) => {
        e.preventDefault();

        const nome = document.getElementById("nome").value.trim();
        const username = document.getElementById("username").value.trim();
        const email = document.getElementById("email").value.trim();
        const password = document.getElementById("password").value;
        const confirmPassword = document.getElementById("confirmPassword").value;

        errorDiv.style.display = "none";
        successDiv.style.display = "none";

        // Validações locais
        if (password !== confirmPassword) {
          errorDiv.textContent = "As senhas não conferem!";
          errorDiv.style.display = "block";
          return;
        }

        if (password.length < 4) {
          errorDiv.textContent = "A senha deve ter pelo menos 4 caracteres!";
          errorDiv.style.display = "block";
          return;
        }

        if (username.length < 3) {
          errorDiv.textContent = "O usuário deve ter pelo menos 3 caracteres!";
          errorDiv.style.display = "block";
          return;
        }

        // Desabilita botão
        btnCriar.disabled = true;
        btnCriar.innerHTML = '<span class="loading-spinner"></span> Criando...';

        try {
          const result = await apiRegister(nome, username, email, password);

          if (result.success) {
            successDiv.textContent = "Conta criada com sucesso! Redirecionando para o login...";
            successDiv.style.display = "block";

            setTimeout(() => {
              window.location.href = "index.html";
            }, 2000);
          } else {
            errorDiv.textContent = result.error || "Erro ao criar conta!";
            errorDiv.style.display = "block";
          }
        } catch (err) {
          errorDiv.textContent = "Erro de conexão com o servidor!";
          errorDiv.style.display = "block";
        } finally {
          btnCriar.disabled = false;
          btnCriar.textContent = "Criar Conta";
        }
      });
    </script>
  </body>
</html>
