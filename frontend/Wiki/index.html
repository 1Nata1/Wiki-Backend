<!DOCTYPE html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      href="https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="Style.css?v=3" />
    <link
      href="https://fonts.googleapis.com/css2?family=Crimson+Pro:wght@400;600;700&display=swap"
      rel="stylesheet"
    />
    <script src="/api.js"></script>
    <script>
      if (!isLogado()) {
        window.location.href = "../Login/";
      }
    </script>
    <title>Wiki da Comunidade</title>
    <style>
      .home-header { text-align: center; padding: 20px 0 10px; }
      .home-header h1 { font-size: 34px; color: white; text-shadow: 2px 2px 4px rgba(0,0,0,0.7); border: none !important; padding: 0 !important; margin: 0 !important; }
      .home-header p { color: rgba(255,255,255,0.6); font-size: 16px; margin-top: 8px; font-family: "Crimson Pro", serif; }
      .home-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-top: 20px; }
      .home-card { background: rgba(255, 255, 255, 0.06); border: 1px solid rgba(76, 175, 80, 0.3); border-radius: 16px; padding: 24px 20px; text-align: center; transition: background 0.3s, transform 0.2s; cursor: pointer; text-decoration: none; display: flex; flex-direction: column; align-items: center; gap: 10px; }
      .home-card:hover { background: rgba(76, 175, 80, 0.15); transform: translateY(-3px); }
      .home-card i { font-size: 42px; color: #81c784; }
      .home-card-avatar { width: 80px; height: 80px; border-radius: 50%; background-size: cover; background-position: top center; border: 2px solid rgba(76, 175, 80, 0.4); flex-shrink: 0; }
      .home-card .card-title { color: white; font-size: 20px; font-weight: 700; }
      .home-card .card-desc { color: rgba(255,255,255,0.6); font-size: 14px; line-height: 1.4; }
      .home-card .card-tag { background: rgba(76, 175, 80, 0.25); color: #81c784; font-size: 11px; padding: 3px 10px; border-radius: 12px; margin-top: 4px; }
      @media (max-width: 480px) { .home-grid { grid-template-columns: 1fr; } .home-header h1 { font-size: 26px; } }
    </style>
  </head>
  <body>
    <div class="container" style="max-width:650px;">
      <div class="header-bar">
        <div class="header-top">
          <h1><b>Wiki da Comunidade</b></h1>
          <a href="perfil.html" class="user-btn" title="Meu Perfil">
            <i class="bx bxs-user-circle"></i>
            <span class="user-name" id="headerUserName"></span>
            <i class="bx bxs-shield mod-btn-icon" id="modIcon" style="display:none;" title="Moderação"></i>
          </a>
        </div>
      </div>

      <div class="home-header">
        <p>Wiki colaborativa da comunidade das lives da WendyJr_</p>
      </div>

      <div class="home-grid">
        <a href="wendy.html" class="home-card">
          <div class="home-card-avatar" style="background-image:url('Imagens/Amanda.webp');"></div>
          <span class="card-title">WendyJr_</span>
          <span class="card-desc">Tudo sobre a streamer: canal, speedruns, feitos, curiosidades e galeria</span>
          <span class="card-tag">Streamer</span>
        </a>

        <a href="#" class="home-card" style="opacity:0.5;cursor:default;">
          <i class="bx bxs-group"></i>
          <span class="card-title">Em breve...</span>
          <span class="card-desc">Novas páginas serão adicionadas pela comunidade</span>
          <span class="card-tag">Em desenvolvimento</span>
        </a>
      </div>
    </div>

    <script>
      const userName = getUserName();
      const nameSpan = document.getElementById("headerUserName");
      if (nameSpan && userName) nameSpan.textContent = userName;

      // Verifica se é moderador
      (async function() {
        if (isLogado()) {
          try {
            const result = await apiGetUser();
            if (result.user?.moderador) {
              const modIcon = document.getElementById("modIcon");
              if (modIcon) {
                modIcon.style.display = "inline";
                modIcon.addEventListener("click", (e) => { e.preventDefault(); window.location.href = "moderacao.html"; });
              }
            }
          } catch(e) {}
        }
      })();
    </script>
  </body>
</html>
